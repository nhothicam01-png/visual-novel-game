<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visual Novel Web</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; position: relative; }
        
        #bg { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        #char { height: 75%; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); z-index: 2; pointer-events: none; }
        
        #dialogue-box { position: absolute; bottom: 20px; width: 92%; left: 4%; background: rgba(0,0,0,0.75); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.3); z-index: 3; box-sizing: border-box; }
        
        /* Nút ở góc phải - Thiết kế to hơn cho mobile */
        #controls { position: fixed; top: 15px; right: 15px; z-index: 4; display: flex; gap: 10px; }
        .control-btn { padding: 12px 20px; font-size: 16px; font-weight: bold; background: rgba(0,0,0,0.6); color: white; border: 2px solid white; border-radius: 8px; cursor: pointer; }
        
        #text { font-size: 18px; line-height: 1.5; margin-bottom: 20px; min-height: 60px; }
        .btn { display: block; width: 100%; margin: 10px 0; padding: 18px; cursor: pointer; background: #007bff; color: white; border: none; font-size: 18px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="game-container">
    <img id="bg">
    <img id="char">
    
    <div id="controls">
        <button onclick="toggleAuto()" class="control-btn" id="btnAuto">Auto: OFF</button>
        <button onclick="resetGame()" class="control-btn">Reset</button>
    </div>

    <div id="dialogue-box">
        <p id="text"></p>
        <button id="btn1" class="btn" onclick="makeChoice(1)">Option 1</button>
        <button id="btn2" class="btn" onclick="makeChoice(2)">Option 2</button>
    </div>
</div>
