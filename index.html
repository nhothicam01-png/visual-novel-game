<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nhung</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100dvh; display: flex; justify-content: center; align-items: center; touch-action: manipulation; }
        #game-container { width: 100vw; height: 100dvh; position: relative; overflow: hidden; }
        
        .bg-base { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        .char-base { height: 75%; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); z-index: 2; pointer-events: none; }
        
        #dialogue-box { 
            position: absolute; bottom: 20px; width: 90%; left: 50%; transform: translateX(-50%); 
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); 
            z-index: 3; box-sizing: border-box; 
        }
        
        .btn { display: block; width: 100%; margin: 8px 0; padding: 12px; cursor: pointer; background: rgba(255,255,255,0.1); color: white; border: 1px solid #fff; border-radius: 5px; font-size: 16px; }
        #controls { position: absolute; top: 10px; right: 10px; z-index: 4; display: flex; gap: 5px; }
        #text { min-height: 50px; font-size: 18px; margin-bottom: 15px; }

        @keyframes shake { 
            0%, 100% { transform: translateX(-50%) translateY(0); } 
            25% { transform: translateX(-52%) translateY(0); } 
            75% { transform: translateX(-48%) translateY(0); } 
        }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        @keyframes jump { 
            0%, 100% { transform: translateX(-50%) translateY(0); } 
            50% { transform: translateX(-50%) translateY(-20px); } 
        }
        
        .shake { animation: shake 0.2s infinite; }
        .fade-in { animation: fade 1s forwards; }
        .jump { animation: jump 0.5s infinite; }
        .idle { animation: none; }
    </style>
</head>
<body>

<div id="game-container">
    <img id="bg" class="bg-base">
    <img id="char" class="char-base">
    <div id="controls">
        <button onclick="toggleAuto(event)" id="btnAuto">Auto: OFF</button>
        <button onclick="resetGame(event)">Reset</button>
    </div>

    <div id="dialogue-box">
        <p id="text"></p>
        <button id="btn1" class="btn" onclick="makeChoice(event, 1)">Option 1</button>
        <button id="btn2" class="btn" onclick="makeChoice(event, 2)">Option 2</button>
    </div>
</div>

<script>
    let storyData = {};
    let currentNodeID = localStorage.getItem("savedNode") || "start";
    let isWaitingForChoice = false;
    let isAutoMode = false;
    let autoTimer = null;
    let bgmPlayer = new Audio();
    let voicePlayer = new Audio();
    let currentBGM = "";

    // Sửa: Thêm ?t=ngẫu nhiên để KHÔNG đọc JSON cũ trong bộ nhớ đệm
    fetch('story.json?t=' + Date.now())
        .then(res => res.json())
        .then(data => {
            storyData = data.nodes;
            console.log("✅ Đã tải xong dữ liệu, các ID có sẵn:", Object.keys(storyData)); // Kiểm tra ID
            showNode(currentNodeID);
        })
        .catch(err => alert("❌ Lỗi tải story.json: " + err.message));

    function applyEffect(element, effectName) {
        element.className = element.classList[0]; 
        if (effectName) {
            requestAnimationFrame(() => { element.classList.add(effectName); });
        }
    }

    function showNode(id) {
        // Sửa: Chỉ về start nếu id trống HOẶC hoàn toàn không tồn tại
        if (!id) id = "start";
        if (!storyData[id]) {
            console.error("❌ Không tìm thấy node ID:", id, "→ quay về start");
            id = "start";
        }

        currentNodeID = id;
        localStorage.setItem("savedNode", id);
        let node = storyData[id];
        console.log("📌 Đang hiển thị node:", id, "→ nextNode:", node.nextNodeID);

        document.getElementById('text').innerText = node.text;
        
        let bg = document.getElementById('bg');
        bg.src = node.changeBackgroundSprite ? "images/" + node.changeBackgroundSprite : "";
        applyEffect(bg, node.bgEffect);

        let char = document.getElementById('char');
        if (node.changeCharacterSprite) {
            char.src = "images/" + node.changeCharacterSprite;
            char.style.display = 'block';
            applyEffect(char, node.charEffect);
        } else {
            char.style.display = 'none';
        }
        
        voicePlayer.pause();
        voicePlayer.currentTime = 0;
        if (node.characterVoice) {
            voicePlayer.src = "audio/" + node.characterVoice;
            voicePlayer.play().catch(e => console.log("Voice không phát:", e));
        }

        if (node.backgroundMusic && node.backgroundMusic !== currentBGM) {
            currentBGM = node.backgroundMusic;
            bgmPlayer.src = "audio/" + currentBGM;
            bgmPlayer.loop = true;
            bgmPlayer.play().catch(() => {});
        }
        
        isWaitingForChoice = !!node.option1Text;
        document.getElementById('btn1').style.display = isWaitingForChoice ? 'block' : 'none';
        document.getElementById('btn1').innerText = node.option1Text || "";
        document.getElementById('btn2').style.display = isWaitingForChoice ? 'block' : 'none';
        document.getElementById('btn2').innerText = node.option2Text || "";
        
        if (isWaitingForChoice) stopAuto();
        else if (isAutoMode) startAuto();
    }

    function resetGame(e) { 
        e.stopPropagation(); e.target.blur(); 
        localStorage.removeItem("savedNode"); 
        showNode("start"); 
    }

    function makeChoice(e, num) { 
        e.stopPropagation(); e.target.blur(); 
        let node = storyData[currentNodeID];
        const targetId = num === 1 ? node.option1TargetID : node.option2TargetID;
        console.log("🎯 Chọn lựa", num, "→ đến ID:", targetId);
        showNode(targetId); 
    }

    function toggleAuto(e) { 
        e.stopPropagation(); e.target.blur(); 
        isAutoMode = !isAutoMode; 
        document.getElementById('btnAuto').innerText = isAutoMode ? "Auto: ON" : "Auto: OFF "; 
        if(!isWaitingForChoice && isAutoMode) startAuto(); else stopAuto(); 
    }

    function startAuto() { 
        stopAuto(); 
        const waitTime = storyData[currentNodeID]?.forceDuration || 2;
        autoTimer = setTimeout(() => { 
            if(storyData[currentNodeID]?.nextNodeID) showNode(storyData[currentNodeID].nextNodeID); 
        }, waitTime * 1000); 
    }

    function stopAuto() { clearTimeout(autoTimer); }

    function tryAdvance(e) { 
        if (bgmPlayer.paused && currentBGM) { bgmPlayer.play().catch(() => {}); }
        if(isAutoMode) { toggleAuto(e); } 
        else if(!isWaitingForChoice && storyData[currentNodeID]?.nextNodeID) { 
            showNode(storyData[currentNodeID].nextNodeID); 
        } 
    }

    window.onclick = tryAdvance;
    document.addEventListener('keydown', (e) => { if(e.code === 'Space') tryAdvance(); });
</script>
</body>
</html>
