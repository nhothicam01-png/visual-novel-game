<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> N&N </title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100dvh; display: flex; justify-content: center; align-items: center; touch-action: manipulation; }
        #game-container { width: 100vw; height: 100dvh; position: relative; overflow: hidden; }
        
        .bg-base { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        .char-base { height: 75%; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); z-index: 2; pointer-events: none; }
        
        #dialogue-box { 
            position: absolute; bottom: 20px; width: 90%; left: 50%; transform: translateX(-50%); 
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); 
            z-index: 3; box-sizing: border-box; 
        }
        
        .btn { display: block; width: 100%; margin: 8px 0; padding: 12px; cursor: pointer; background: rgba(255,255,255,0.1); color: white; border: 1px solid #fff; border-radius: 5px; font-size: 16px; }
        #controls { position: absolute; top: 10px; right: 10px; z-index: 4; display: flex; gap: 5px; }
        #text { min-height: 50px; font-size: 18px; margin-bottom: 15px; }

        @keyframes shake { 
            0%, 100% { transform: translateX(-50%) translateY(0); } 
            25% { transform: translateX(-52%) translateY(0); } 
            75% { transform: translateX(-48%) translateY(0); } 
        }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        @keyframes jump { 
            0%, 100% { transform: translateX(-50%) translateY(0); } 
            50% { transform: translateX(-50%) translateY(-20px); } 
        }
        
        .shake { animation: shake 0.2s infinite; }
        .fade-in { animation: fade 1s forwards; }
        .jump { animation: jump 0.5s infinite; }
        .idle { animation: none; }
    </style>
</head>
<body>

<div id="game-container">
    <img id="bg" class="bg-base">
    <img id="char" class="char-base">
    <div id="controls">
        <button onclick="toggleAuto(event)" id="btnAuto">Auto: OFF</button>
        <button onclick="resetGame(event)">Reset & Xóa lưu</button>
    </div>

    <div id="dialogue-box">
        <p id="text"></p>
        <button id="btn1" class="btn" onclick="makeChoice(event, 1)"></button>
        <button id="btn2" class="btn" onclick="makeChoice(event, 2)"></button>
    </div>
</div>

<script>
    let storyData = {};
    let currentNodeID = "start";
    let isWaitingForChoice = false;
    let isAutoMode = false;
    let autoTimer = null;
    let bgmPlayer = new Audio();
    let voicePlayer = new Audio();
    let currentBGM = "";

    // Tải JSON mới nhất, không đọc bộ nhớ đệm
    fetch('story.json?t=' + Date.now())
        .then(res => {
            if (!res.ok) throw new Error("Không tìm thấy tệp story.json");
            return res.json();
        })
        .then(data => {
            storyData = data.nodes;
            console.log("✅ Đã tải xong, tổng số node:", Object.keys(storyData).length);

            // Kiểm tra tiến trình lưu cũ
            const saved = localStorage.getItem("savedNode");
            if (saved && storyData[saved]) {
                currentNodeID = saved;
                console.log("📂 Tiếp tục từ:", saved);
            } else {
                localStorage.removeItem("savedNode");
                console.log("🔄 Bắt đầu từ đầu");
            }

            showNode(currentNodeID);
        })
        .catch(err => alert("❌ Lỗi: " + err.message + "\nĐặt story.json cùng thư mục với file HTML nhé!"));

    function applyEffect(element, effectName) {
        element.className = element.classList[0]; 
        if (effectName && effectName !== "idle") {
            requestAnimationFrame(() => { element.classList.add(effectName); });
        }
    }

    function showNode(id) {
        // Kiểm tra ID hợp lệ
        if (!id || id.trim() === "") {
            console.warn("⚠️ ID đích trống, giữ nguyên node hiện tại");
            return;
        }
        if (!storyData[id]) {
            console.error("❌ Không tìm thấy node ID:", id);
            alert(`Lỗi: Không có nội dung "${id}"!\nKiểm tra lại tệp JSON nhé.`);
            return;
        }

        // Reset trạng thái cũ HOÀN TOÀN trước khi hiển thị node mới
        isWaitingForChoice = false;
        stopAuto();

        currentNodeID = id;
        localStorage.setItem("savedNode", id);
        const node = storyData[id];
        console.log(`✅ Đang mở: ${id} | ${node.text}`);

        document.getElementById('text').innerText = node.text;
        
        // Nền & nhân vật
        const bg = document.getElementById('bg');
        bg.src = node.changeBackgroundSprite ? `images/${node.changeBackgroundSprite}` : "";
        applyEffect(bg, node.bgEffect || "idle");

        const char = document.getElementById('char');
        if (node.changeCharacterSprite) {
            char.src = `images/${node.changeCharacterSprite}`;
            char.style.display = 'block';
            applyEffect(char, node.charEffect || "idle");
        } else {
            char.style.display = 'none';
        }
        
        // Âm thanh
        voicePlayer.pause();
        voicePlayer.currentTime = 0;
        if (node.characterVoice) {
            voicePlayer.src = `audio/${node.characterVoice}`;
            voicePlayer.play().catch(e => console.log("Voice:", e));
        }

        if (node.backgroundMusic && node.backgroundMusic !== currentBGM) {
            currentBGM = node.backgroundMusic;
            bgmPlayer.src = `audio/${currentBGM}`;
            bgmPlayer.loop = true;
            bgmPlayer.play().catch(() => {});
        }
        
        // --- XỬ LÝ NÚT LỰA CHỌN (SỬA CHÍNH XÁC) ---
        const btn1 = document.getElementById('btn1');
        const btn2 = document.getElementById('btn2');

        // Luôn xóa nội dung cũ trước
        btn1.innerText = "";
        btn2.innerText = "";
        btn1.style.display = "none";
        btn2.style.display = "none";

        // Chỉ hiển thị nếu có CẢ text VÀ ID đích
        const hasOption1 = node.option1Text && node.option1Text.trim() !== "" && node.option1TargetID && node.option1TargetID.trim() !== "";
        const hasOption2 = node.option2Text && node.option2Text.trim() !== "" && node.option2TargetID && node.option2TargetID.trim() !== "";

        if (hasOption1) {
            btn1.innerText = node.option1Text;
            btn1.style.display = "block";
        }
        if (hasOption2) {
            btn2.innerText = node.option2Text;
            btn2.style.display = "block";
        }

        isWaitingForChoice = hasOption1 || hasOption2;
        console.log(`🔘 Có lựa chọn: ${isWaitingForChoice} | Nút 1: ${hasOption1} | Nút 2: ${hasOption2}`);
        
        if (!isWaitingForChoice && isAutoMode) startAuto();
    }

    function resetGame(e) { 
        e.stopPropagation(); e.target.blur(); 
        localStorage.clear(); 
        console.log("🔄 Đã reset hoàn toàn");
        showNode("start"); 
    }

    function makeChoice(e, num) { 
        e.stopPropagation(); e.target.blur(); 
        const node = storyData[currentNodeID];
        const targetId = num === 1 ? node.option1TargetID : node.option2TargetID;
        console.log(`🎯 Chọn ${num}: "${num ===1 ? node.option1Text : node.option2Text}" → đến ID: ${targetId}`);
        
        // Chỉ chuyển nếu ID đích hợp lệ
        if (targetId && targetId.trim() !== "" && storyData[targetId]) {
            showNode(targetId); 
        } else {
            console.error("❌ ID đích không hợp lệ:", targetId);
            alert("Lỗi: Lựa chọn không có đích đến!");
        }
    }

    function toggleAuto(e) { 
        e.stopPropagation(); e.target.blur(); 
        isAutoMode = !isAutoMode; 
        document.getElementById('btnAuto').innerText = isAutoMode ? "Auto: ON" : "Auto: OFF "; 
        if(!isWaitingForChoice && isAutoMode) startAuto(); else stopAuto(); 
    }

    function startAuto() { 
        stopAuto(); 
        const waitTime = storyData[currentNodeID]?.forceDuration || 2;
        autoTimer = setTimeout(() => { 
            const nextId = storyData[currentNodeID]?.nextNodeID;
            if(nextId && storyData[nextId]) {
                console.log(`➡️ Tự chuyển đến: ${nextId}`);
                showNode(nextId); 
            }
        }, waitTime * 1000); 
    }

    function stopAuto() { clearTimeout(autoTimer); }

    function tryAdvance(e) { 
        if (bgmPlayer.paused && currentBGM) { bgmPlayer.play().catch(() => {}); }
        if(isAutoMode) { toggleAuto(e); } 
        else if(!isWaitingForChoice) { 
            const nextId = storyData[currentNodeID]?.nextNodeID;
            if(nextId && storyData[nextId]) {
                console.log(`➡️ Chuyển tiếp đến: ${nextId}`);
                showNode(nextId); 
            } else {
                console.log(`ℹ️ Không có node tiếp theo → kết thúc`);
            }
        } 
    }

    window.onclick = tryAdvance;
    document.addEventListener('keydown', (e) => { if(e.code === 'Space') tryAdvance(); });
</script>
</body>
</html>
