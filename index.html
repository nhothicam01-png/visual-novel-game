<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visual Novel Web</title>
    <style>
    /* Sử dụng 100dvh thay vì 100vh để tránh bị che bởi thanh công cụ trình duyệt */
    body { 
        margin: 0; 
        background: #000; 
        color: white; 
        font-family: sans-serif; 
        height: 100dvh; /* Đơn vị dynamic giúp khớp đúng màn hình mobile */
        overflow: hidden; 
    }
    
    #game-container { 
        width: 100vw; 
        height: 100dvh; 
        position: relative; 
    }
    
    /* Điều chỉnh Z-index cho nhóm nút điều khiển */
    #controls { 
        position: fixed; 
        top: 10px; /* Cách mép trên một khoảng an toàn */
        right: 10px; 
        z-index: 100; /* Đưa lên cao nhất để không bị che */
        display: flex; 
        gap: 10px; 
    }
    
    .control-btn { 
        padding: 15px 20px; /* Tăng padding để dễ chạm bằng ngón tay */
        font-size: 18px; 
        background: rgba(0,0,0,0.7); 
        color: white; 
        border: 2px solid white; 
        border-radius: 10px; 
        cursor: pointer; 
    }

    /* Đảm bảo hộp thoại không bị che bởi thanh nav dưới */
    #dialogue-box { 
        position: absolute; 
        bottom: 10px; /* Cách đáy một khoảng */
        width: 90%; 
        left: 5%; 
        padding: 20px; 
        background: rgba(0,0,0,0.8); 
        border-radius: 15px; 
        z-index: 50; 
    }
</style>
</head>
<body>

<div id="game-container">
    <img id="bg">
    <img id="char">
    
    <div id="controls">
        <button onclick="toggleAuto()" class="control-btn" id="btnAuto">Auto: OFF</button>
        <button onclick="resetGame()" class="control-btn">Reset</button>
    </div>

    <div id="dialogue-box">
        <p id="text"></p>
        <button id="btn1" class="btn" onclick="makeChoice(1)">Option 1</button>
        <button id="btn2" class="btn" onclick="makeChoice(2)">Option 2</button>
    </div>
</div>
