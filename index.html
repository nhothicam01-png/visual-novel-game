<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Visual Novel Web</title>
    <style>
    /* Cho body lấp đầy màn hình và ẩn thanh cuộn */
    body { 
        margin: 0; 
        background: #000; 
        color: white; 
        font-family: sans-serif; 
        height: 100vh; 
        display: flex; 
        justify-content: center; 
        align-items: center;
    }

    /* Game container chiếm toàn bộ màn hình hoặc tỉ lệ 16:9 nếu trên máy tính */
    #game-container { 
        width: 100vw; 
        height: 100vh; 
        position: relative; 
        overflow: hidden; 
    }

    /* Quan trọng: object-fit: cover giúp ảnh lấp đầy mà không bị bể/méo */
    #bg { 
        width: 100%; 
        height: 100%; 
        object-fit: cover; /* Cắt ảnh lấp đầy khung hình */
        position: absolute;
    }

    #char { 
        height: 80%; 
        position: absolute; 
        bottom: 0; 
        left: 50%; 
        transform: translateX(-50%); /* Căn giữa nhân vật */
    }

    #dialogue-box { 
        position: absolute; 
        bottom: 20px; 
        width: 90%; 
        left: 5%; 
        background: rgba(0,0,0,0.6); 
        padding: 20px; 
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.2);
    }

    .btn { 
        display: block; 
        width: 100%;
        margin: 5px 0; 
        padding: 15px; 
        cursor: pointer; 
        background: #333; 
        color: white; 
        border: none;
    }
</style>
</head>
<body>

<div id="game-container">
    <img id="bg">
    <img id="char">
    <div id="dialogue-box">
        <p id="text"></p>
        <button id="btn1" class="btn" onclick="makeChoice(1)">Option 1</button>
        <button id="btn2" class="btn" onclick="makeChoice(2)">Option 2</button>
    </div>
</div>

<script>
    let storyData = {};
    let currentNodeID = "start";
    let isWaitingForChoice = false;

    // Load dữ liệu
    fetch('story.json').then(res => res.json()).then(data => {
        storyData = data.nodes;
        showNode(currentNodeID);
    });

    function showNode(id) {
        let node = storyData[id];
        document.getElementById('text').innerText = node.text;
        document.getElementById('bg').src = "images/"+node.changeBackgroundSprite;
        
        if (node.option1Text) {
            isWaitingForChoice = true;
            document.getElementById('btn1').style.display = 'block';
            document.getElementById('btn1').innerText = node.option1Text;
            document.getElementById('btn2').style.display = 'block';
            document.getElementById('btn2').innerText = node.option2Text;
        } else {
            isWaitingForChoice = false;
            document.getElementById('btn1').style.display = 'none';
            document.getElementById('btn2').style.display = 'none';
        }
    }

    function makeChoice(num) {
    let node = storyData[currentNodeID];
    currentNodeID = (num === 1) ? node.option1TargetID : node.option2TargetID;
    
    // Thêm dòng này để reset trạng thái
    isWaitingForChoice = false; 
    
    showNode(currentNodeID);
}

   function tryAdvance() {
        if (!isWaitingForChoice) {
            let node = storyData[currentNodeID];
            if(node && node.nextNodeID) {
                currentNodeID = node.nextNodeID;
                showNode(currentNodeID);
            }
        }
    }

    // Gán vào cả click và phím
    window.onclick = tryAdvance;
    document.addEventListener('keydown', (e) => { if(e.code === 'Space') { e.preventDefault(); tryAdvance(); } });
</script>
</body>
</html>
