<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visual Novel Web</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; position: relative; }
        
        #bg { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        #char { height: 75%; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); z-index: 2; }
        
        /* Box chứa nút Auto và Reset */
        #top-controls { position: absolute; top: 15px; right: 15px; z-index: 10; display: flex; gap: 10px; }
        .control-btn { padding: 12px 20px; font-size: 16px; background: rgba(0,0,0,0.7); color: white; border: 1px solid white; border-radius: 8px; cursor: pointer; }

        #dialogue-box { position: absolute; bottom: 30px; width: 90%; left: 5%; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.3); z-index: 3; }
        #text { font-size: 1.2rem; line-height: 1.5; margin-bottom: 20px; }
        
        /* Nút lựa chọn to và dễ bấm */
        .btn { display: block; width: 100%; margin: 10px 0; padding: 20px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <img id="bg">
    <img id="char">
    
    <div id="top-controls">
        <button onclick="toggleAuto()" id="btnAuto" class="control-btn">Auto: OFF</button>
        <button onclick="resetGame()" class="control-btn">Reset</button>
    </div>

    <div id="dialogue-box">
        <p id="text"></p>
        <button id="btn1" class="btn" onclick="makeChoice(1)">Option 1</button>
        <button id="btn2" class="btn" onclick="makeChoice(2)">Option 2</button>
    </div>
</div>

<script>
    let storyData = {};
    let currentNodeID = localStorage.getItem("savedNode") || "start";
    let isWaitingForChoice = false;
    let isAutoMode = false;
    let autoTimer = null;
    
    let bgmPlayer = new Audio();
    let currentBGM = "";

    fetch('story.json').then(res => res.json()).then(data => {
        storyData = data.nodes;
        showNode(currentNodeID);
    });

    function showNode(id) {
        if (!id || !storyData[id]) id = "start";
        currentNodeID = id;
        localStorage.setItem("savedNode", id);

        let node = storyData[id];
        document.getElementById('text').innerText = node.text;
        
        document.getElementById('bg').src = "images/" + node.changeBackgroundSprite;
        let charImg = document.getElementById('char');
        if (node.changeCharacterSprite && node.changeCharacterSprite !== "") {
            charImg.src = "images/" + node.changeCharacterSprite;
            charImg.style.display = 'block';
        } else {
            charImg.style.display = 'none';
        }
        
        if (node.backgroundMusic && node.backgroundMusic !== currentBGM) {
            currentBGM = node.backgroundMusic;
            bgmPlayer.src = "audio/" + currentBGM;
            bgmPlayer.loop = true;
            bgmPlayer.play().catch(e => console.log("Cần click để phát nhạc"));
        }
        
        if (node.option1Text) {
            isWaitingForChoice = true;
            document.getElementById('btn1').style.display = 'block';
            document.getElementById('btn1').innerText = node.option1Text;
            document.getElementById('btn2').style.display = 'block';
            document.getElementById('btn2').innerText = node.option2Text;
            stopAuto();
        } else {
            isWaitingForChoice = false;
            document.getElementById('btn1').style.display = 'none';
            document.getElementById('btn2').style.display = 'none';
            if (isAutoMode) startAuto();
        }
    }

    function makeChoice(num) {
        let node = storyData[currentNodeID];
        currentNodeID = (num === 1) ? node.option1TargetID : node.option2TargetID;
        isWaitingForChoice = false;
        showNode(currentNodeID);
    }

    function resetGame() {
        localStorage.removeItem("savedNode");
        window.location.reload();
    }

    function toggleAuto() {
        isAutoMode = !isAutoMode;
        document.getElementById('btnAuto').innerText = isAutoMode ? "Auto: ON" : "Auto: OFF";
        if (isAutoMode && !isWaitingForChoice) startAuto();
        else stopAuto();
    }

    function startAuto() {
        stopAuto();
        autoTimer = setTimeout(() => {
            let node = storyData[currentNodeID];
            if (node && node.nextNodeID) {
                currentNodeID = node.nextNodeID;
                showNode(currentNodeID);
            }
        }, 2000);
    }

    function stopAuto() { clearTimeout(autoTimer); }

    function tryAdvance() {
        if (isAutoMode) { toggleAuto(); return; }
        if (!isWaitingForChoice) {
            let node = storyData[currentNodeID];
            if(node && node.nextNodeID) {
                currentNodeID = node.nextNodeID;
                showNode(currentNodeID);
            }
        }
    }

    window.onclick = tryAdvance;
    document.addEventListener('keydown', (e) => { if(e.code === 'Space') { e.preventDefault(); tryAdvance(); } });
</script>
</body>
</html>
