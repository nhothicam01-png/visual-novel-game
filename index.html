<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visual Novel Web</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100dvh; display: flex; justify-content: center; align-items: center; touch-action: manipulation; }
        #game-container { width: 100vw; height: 100dvh; position: relative; overflow: hidden; }
        
        /* Class định dạng cơ bản (Luôn giữ lại) */
        .bg-base { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        .char-base { height: 75%; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); z-index: 2; pointer-events: none; }
        
        #dialogue-box { 
            position: absolute; bottom: 20px; width: 90%; left: 50%; transform: translateX(-50%); 
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3); 
            z-index: 3; box-sizing: border-box; 
        }
        
        .btn { display: block; width: 100%; margin: 8px 0; padding: 12px; cursor: pointer; background: rgba(255,255,255,0.1); color: white; border: 1px solid #fff; border-radius: 5px; font-size: 16px; }
        #controls { position: absolute; top: 10px; right: 10px; z-index: 4; display: flex; gap: 5px; }
        #text { min-height: 50px; font-size: 18px; margin-bottom: 15px; }

        /* Các hiệu ứng animation */
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-10px, 0); } 75% { transform: translate(10px, 0); } }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        
        .shake { animation: shake 0.2s infinite; }
        .fade-in { animation: fade 1s forwards; }
        .jump { animation: jump 0.5s infinite; }
    </style>
</head>
<body>

<div id="game-container">
    <img id="bg" class="bg-base">
    <img id="char" class="char-base">
    
    <div id="controls">
        <button onclick="toggleAuto(event)" id="btnAuto">Auto: OFF</button>
        <button onclick="resetGame(event)">Reset</button>
    </div>

    <div id="dialogue-box">
        <p id="text"></p>
        <button id="btn1" class="btn" onclick="makeChoice(event, 1)">Option 1</button>
        <button id="btn2" class="btn" onclick="makeChoice(event, 2)">Option 2</button>
    </div>
</div>

<script>
    let storyData = {};
    let currentNodeID = localStorage.getItem("savedNode") || "start";
    let isWaitingForChoice = false;
    let isAutoMode = false;
    let autoTimer = null;
    let bgmPlayer = new Audio();
    let currentBGM = "";

    fetch('story.json').then(res => res.json()).then(data => {
        storyData = data.nodes;
        showNode(currentNodeID);
        showNotification("Sẵn sàng!");
    });

    function showNode(id) {
        if (!id || !storyData[id]) id = "start";
        currentNodeID = id;
        localStorage.setItem("savedNode", id);

        let node = storyData[id];
        document.getElementById('text').innerText = node.text;
        
        // 1. Cập nhật Background
        let bgImg = document.getElementById('bg');
        bgImg.src = "images/" + node.changeBackgroundSprite;
        // Xóa các class hiệu ứng cũ, giữ lại bg-base
        bgImg.className = "bg-base"; 
        if (node.bgEffect) bgImg.classList.add(node.bgEffect);

        // 2. Cập nhật Character
        let charImg = document.getElementById('char');
        if (node.changeCharacterSprite && node.changeCharacterSprite !== "") {
            charImg.src = "images/" + node.changeCharacterSprite;
            charImg.style.display = 'block';
            // Xóa các class hiệu ứng cũ, giữ lại char-base
            charImg.className = "char-base";
            if (node.charEffect) charImg.classList.add(node.charEffect);
        } else {
            charImg.style.display = 'none';
        }
        // Nhạc nền
        if (node.backgroundMusic && node.backgroundMusic !== currentBGM) {
            currentBGM = node.backgroundMusic;
            bgmPlayer.src = "audio/" + currentBGM;
            bgmPlayer.loop = true;
            bgmPlayer.play().catch(e => console.log("Cần tương tác để phát nhạc"));
        }
        
        // Nút chọn
        if (node.option1Text) {
            isWaitingForChoice = true;
            document.getElementById('btn1').style.display = 'block';
            document.getElementById('btn1').innerText = node.option1Text;
            document.getElementById('btn2').style.display = 'block';
            document.getElementById('btn2').innerText = node.option2Text;
            stopAuto();
        } else {
            isWaitingForChoice = false;
            document.getElementById('btn1').style.display = 'none';
            document.getElementById('btn2').style.display = 'none';
            if (isAutoMode) startAuto();
        }
    }

    function showNotification(message) {
        let textBox = document.getElementById('text');
        let old = textBox.innerText;
        textBox.innerText = "⭐ " + message;
        setTimeout(() => { textBox.innerText = old; }, 2000);
    }

    function resetGame(e) { 
        e.stopPropagation(); 
        e.target.blur(); 
        localStorage.removeItem("savedNode"); 
        showNode("start"); 
        showNotification("Đã khởi động lại!"); 
    }
    
    function makeChoice(e, num) { 
        e.stopPropagation(); 
        e.target.blur(); // Bỏ focus để không bị chọn lại khi bấm Space
        let node = storyData[currentNodeID];
        currentNodeID = (num === 1) ? node.option1TargetID : node.option2TargetID;
        showNode(currentNodeID); 
    }

    function toggleAuto(e) { 
        e.stopPropagation(); 
        e.target.blur(); 
        isAutoMode = !isAutoMode; 
        document.getElementById('btnAuto').innerText = isAutoMode ? "Auto: ON" : "Auto: OFF";
        isAutoMode ? startAuto() : stopAuto();
    }

    function startAuto() {
        stopAuto();
        autoTimer = setTimeout(() => {
            let node = storyData[currentNodeID];
            if (node && node.nextNodeID) {
                currentNodeID = node.nextNodeID;
                showNode(currentNodeID);
            }
        }, 2000);
    }

    function stopAuto() { clearTimeout(autoTimer); }

    function tryAdvance(event) {
        if (bgmPlayer.paused && currentBGM !== "") { bgmPlayer.play().catch(() => {}); }
        if (isAutoMode) { toggleAuto(event || new Event('click')); return; }
        if (!isWaitingForChoice) {
            let n = storyData[currentNodeID];
            if(n && n.nextNodeID) showNode(n.nextNodeID);
        }
    }

    window.onclick = tryAdvance;
    document.addEventListener('keydown', (e) => { if(e.code === 'Space') tryAdvance(); });
    document.getElementById('char').addEventListener('error', function() { this.style.display = 'none'; });
</script>
</body>
</html>
